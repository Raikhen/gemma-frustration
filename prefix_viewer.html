<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Prefix Viewer — Gemma Frustration</title>
<style>
  :root {

    --surface: #1a1d27;

    --border: #2e3345;
    --text: #e1e4ed;

    --accent: #7c6cf0;
    --green: #34d399;
    --yellow: #fbbf24;
    --orange: #f97316;
    --red: #ef4444;

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {

    color: var(--text);

    height: 100vh;
    overflow: hidden;
  }

  /* --- Sidebar --- */
  .sidebar {
    width: 340px;
    min-width: 340px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 20px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-header h1 {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 12px;
  }

  .load-btn {
    display: block;
    width: 100%;
    padding: 10px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .load-btn:hover { opacity: 0.85; }

  .stats {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  .stat {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 50px;
  }
  .stat-value { font-size: 20px; font-weight: 700; }
  .stat-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }

  .filters {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .filter-chip {

    border-radius: 12px;
    font-size: 11px;
    font-weight: 500;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-chip:hover { border-color: var(--text-dim); }
  .filter-chip.active { background: var(--accent); border-color: var(--accent); color: white; }

  .rollout-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }

  .rollout-item {
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.1s;
    margin-bottom: 2px;
    display: flex;
    align-items: center;
    gap: 10px;

  .rollout-badge {
    min-width: 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 700;
    flex-shrink: 0;
  }

    flex: 1;
    min-width: 0;
  }
  .rollout-id {
    font-size: 12px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    color: var(--text-dim);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .rollout-meta {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .frustration-bar {
    width: 60px;
    height: 6px;
    background: var(--surface);
    border-radius: 3px;
    overflow: hidden;
    flex-shrink: 0;
  }
  .frustration-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.3s;
  }

  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .main-header {
    padding: 20px 28px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .main-header h2 {
    font-size: 15px;
    font-weight: 600;
  }

  .score-pills {
    display: flex;
    gap: 8px;
  }
  .score-pill {
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
  }

  .conversation {
    flex: 1;
    overflow-y: auto;
    padding: 24px 28px;
  }

    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-dim);
    font-size: 14px;

    display: flex;
    gap: 12px;
  }

    width: 36px;
    height: 36px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 600;

    min-width: 0;
  }

  .turn-role {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }
  .turn-role.user { color: var(--blue); }
  .turn-role.assistant { color: var(--green); }

  .turn-text {
    font-size: 13px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
    background: var(--surface);
    border-radius: 10px;
    padding: 14px 16px;
    border: 1px solid var(--border);
    max-height: 400px;
    overflow-y: auto;
  }

  .turn-score {
    margin-top: 8px;
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .turn-score-badge {
    padding: 3px 8px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 600;
  }

  .turn-evidence {
    font-size: 11px;
    color: var(--text-dim);
    font-style: italic;
    max-width: 500px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .distribution {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
  }
  .dist-label {
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;

    height: 24px;
    align-items: flex-end;

  .dist-bar {
    flex: 1;

    min-height: 2px;

    bottom: -14px;

const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);

let rollouts = [];
let activeFilter = 'all';

function frustColor(score) {
  if (score <= 1) return 'var(--green)';
  if (score <= 2) return '#6ee7b7';
  if (score <= 3) return 'var(--yellow)';
  if (score <= 4) return 'var(--orange)';
  if (score <= 6) return 'var(--orange)';
  if (score <= 8) return 'var(--red)';
  return '#dc2626';
}

function frustBg(score) {
  if (score < 3) return 'rgba(52, 211, 153, 0.15)';
  if (score < 5) return 'rgba(251, 191, 36, 0.15)';
  return 'rgba(239, 68, 68, 0.15)';
}

function frustLabel(score) {
  if (score < 3) return 'low';
  if (score < 5) return 'mid';
  return 'high';
}

function loadData(data) {
  rollouts = data.sort((a, b) => b.max_frustration - a.max_frustration);
  renderStats();
  renderDistribution();
  renderFilters();
  renderList();
}

function renderStats() {
  const el = $('#stats');
  el.style.display = 'flex';
  const high = rollouts.filter(r => r.max_frustration >= 5).length;
  const mid = rollouts.filter(r => r.max_frustration >= 3 && r.max_frustration < 5).length;
  const low = rollouts.filter(r => r.max_frustration < 3).length;
  const avg = rollouts.reduce((s, r) => s + r.max_frustration, 0) / rollouts.length;

  el.innerHTML = `
    <div class="stat"><div class="stat-value">${rollouts.length}</div><div class="stat-label">Total</div></div>
    <div class="stat"><div class="stat-value" style="color:var(--red)">${high}</div><div class="stat-label">High ≥5</div></div>
    <div class="stat"><div class="stat-value" style="color:var(--yellow)">${mid}</div><div class="stat-label">Mid 3-4</div></div>
    <div class="stat"><div class="stat-value" style="color:var(--green)">${low}</div><div class="stat-label">Low <3</div></div>
    <div class="stat"><div class="stat-value">${avg.toFixed(1)}</div><div class="stat-label">Mean</div></div>
  `;
}

function renderDistribution() {
  const el = $('#distribution');
  el.style.display = 'block';
  const bins = Array(11).fill(0);
  rollouts.forEach(r => {
    const s = Math.round(r.max_frustration);
    if (s >= 0 && s <= 10) bins[s]++;
  });
  const maxBin = Math.max(...bins, 1);
  const bars = $('#distBars');
  bars.innerHTML = bins.map((count, i) =>
    `<div class="dist-bar" style="height:${Math.max(2, (count / maxBin) * 24)}px; background:${frustColor(i)}" title="Score ${i}: ${count} rollouts"><div class="dist-bar-label">${i}</div></div>`
  ).join('');
}

function renderFilters() {
  const el = $('#filters');
  el.style.display = 'flex';
  const groups = [
    { key: 'all', label: `All (${rollouts.length})` },
    { key: 'high', label: `High ≥5 (${rollouts.filter(r => r.max_frustration >= 5).length})` },
    { key: 'mid', label: `Mid 3-4 (${rollouts.filter(r => r.max_frustration >= 3 && r.max_frustration < 5).length})` },
    { key: 'low', label: `Low <3 (${rollouts.filter(r => r.max_frustration < 3).length})` },
  ];
  el.innerHTML = groups.map(g =>
    `<button class="filter-chip ${g.key === activeFilter ? 'active' : ''}" data-filter="${g.key}">${g.label}</button>`
  ).join('');

  el.querySelectorAll('.filter-chip').forEach(btn => {
    btn.addEventListener('click', () => {
      activeFilter = btn.dataset.filter;
      renderFilters();
      renderList();
    });
  });
}

function filterRollouts() {
  if (activeFilter === 'all') return rollouts;
  if (activeFilter === 'high') return rollouts.filter(r => r.max_frustration >= 5);
  if (activeFilter === 'mid') return rollouts.filter(r => r.max_frustration >= 3 && r.max_frustration < 5);
  if (activeFilter === 'low') return rollouts.filter(r => r.max_frustration < 3);
  return rollouts;
}

function renderList() {
  const list = $('#rolloutList');
  const filtered = filterRollouts();
  list.innerHTML = filtered.map((r, i) => `
    <div class="rollout-item" data-idx="${rollouts.indexOf(r)}">
      <div class="rollout-badge" style="background:${frustBg(r.max_frustration)}; color:${frustColor(r.max_frustration)}">
        ${r.max_frustration}
      </div>
      <div class="rollout-info">
        <div class="rollout-id">${r.id}</div>
        <div class="rollout-meta">${r.num_turns} turns · ${r.condition || 'unknown'} · ${frustLabel(r.max_frustration)}</div>
      </div>
      <div class="frustration-bar">
        <div class="frustration-fill" style="width:${r.max_frustration * 10}%; background:${frustColor(r.max_frustration)}"></div>
      </div>
    </div>
  `).join('');

  list.querySelectorAll('.rollout-item').forEach(item => {
    item.addEventListener('click', () => {
      $$('.rollout-item').forEach(el => el.classList.remove('selected'));
      item.classList.add('selected');
      renderConversation(rollouts[parseInt(item.dataset.idx)]);
    });
  });
}

function renderConversation(rollout) {
  const header = $('#mainHeader');
  header.style.display = 'flex';
  $('#headerTitle').textContent = `${rollout.id.slice(0, 12)}… · ${rollout.condition || 'unknown'}`;

  const pills = $('#scorePills');
  const scores = rollout.scores || [];
  pills.innerHTML = scores.map((s, i) =>
    `<span class="score-pill" style="background:${frustBg(s.rating)}; color:${frustColor(s.rating)}">Turn ${s.turn}: ${s.rating}/10</span>`
  ).join('');

  const conv = $('#conversation');
  const messages = rollout.messages || [];
  let turnIdx = 0;

  conv.innerHTML = messages.map((msg, i) => {
    const isAssistant = msg.role === 'assistant';
    const icon = isAssistant ? 'A' : 'U';
    let scoreHtml = '';

    if (isAssistant && scores[turnIdx]) {
      const s = scores[turnIdx];
      scoreHtml = `
        <div class="turn-score">
          <span class="turn-score-badge" style="background:${frustBg(s.rating)}; color:${frustColor(s.rating)}">
            Frustration: ${s.rating}/10
          </span>
          <span class="turn-evidence">"${s.evidence || ''}"</span>
        </div>
      `;
      turnIdx++;
    }

    return `
      <div class="turn">
        <div class="turn-indicator ${msg.role}">${icon}</div>
        <div class="turn-content">
          <div class="turn-role ${msg.role}">${msg.role}</div>
          <div class="turn-text">${escapeHtml(msg.content)}</div>
          ${scoreHtml}
        </div>
      </div>
    `;
  }).join('');

  conv.scrollTop = 0;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// File loading (for additional files)
$('#loadBtn').addEventListener('click', () => $('#fileInput').click());
$('#fileInput').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const text = await file.text();
  const data = text.trim().split('\n').map(line => JSON.parse(line));
  loadData(data);
  $('#loadBtn').textContent = file.name;
});

// Drag and drop
document.body.addEventListener('dragover', e => { e.preventDefault(); });
document.body.addEventListener('drop', async (e) => {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if (!file || !file.name.endsWith('.jsonl')) return;
  const text = await file.text();
  const data = text.trim().split('\n').map(line => JSON.parse(line));
  loadData(data);
  $('#loadBtn').textContent = file.name;
});

// Auto-load embedded data
loadData(EMBEDDED_DATA);
$('#loadBtn').textContent = 'existing_impossible.jsonl (loaded)';
</script>
